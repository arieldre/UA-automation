<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Heat — Ad Dashboard</title>
<style>
:root {
  --bg:#0d0d14; --surface:#16161f; --surface2:#1e1e2a; --border:#2a2a38;
  --text:#e2e2f0; --muted:#6b6b88; --accent:#7c6fff;
  --green:#22c55e; --red:#ef4444; --green-bg:rgba(34,197,94,.08); --red-bg:rgba(239,68,68,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}

/* ── Filters bar ── */
.filters{display:flex;align-items:center;gap:8px;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:0;z-index:20}
.filters h1{font-size:16px;font-weight:600;margin-right:8px;white-space:nowrap}
.filters h1 span{color:var(--accent)}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
.btn-group{display:flex;gap:3px}
.btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.icon{padding:5px 9px;font-size:14px}
input[type=date]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;outline:none;cursor:pointer}
input[type=date]:focus{border-color:var(--accent)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.8);cursor:pointer;opacity:1}

/* ── Metric toggles ── */
.metric-bar{display:flex;align-items:center;gap:6px;padding:10px 24px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.metric-bar .bar-label{font-size:11px;color:var(--muted);margin-right:4px;white-space:nowrap}
.chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:none;transition:all .15s;white-space:nowrap}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:hover:not(.on){border-color:var(--accent);color:var(--accent)}

/* ── Main ── */
main{max-width:1200px;margin:0 auto;padding:20px 24px}

/* ── Metrics table ── */
.section-hd{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;margin-top:24px}
.metrics-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:4px}
.metrics-table table{width:100%;border-collapse:collapse}
.metrics-table thead th{padding:9px 18px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.metrics-table thead th:not(:first-child){text-align:right}
.metrics-table tbody tr:hover{background:rgba(255,255,255,.02)}
.metrics-table tbody td{padding:10px 18px;font-size:13px;font-variant-numeric:tabular-nums}
.metrics-table tbody td:not(:first-child){text-align:right}
.metric-name{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;cursor:help;position:relative}
.metric-name .tip-icon{font-size:10px;border:1px solid var(--border);border-radius:50%;padding:0 3px;color:var(--border)}
.metric-name .tooltip{display:none;position:absolute;left:0;top:calc(100% + 4px);background:#1a1a2e;border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:11px;line-height:1.5;width:240px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none}
.metric-name .tooltip strong{color:var(--accent);display:block;margin-bottom:3px}
.metric-name:hover .tooltip{display:block}

/* ── Diff chip ── */
.diff{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block}
.diff.good{color:var(--green);background:var(--green-bg)}
.diff.warn{color:var(--red);background:var(--red-bg)}
.diff.neutral{color:var(--muted)}

/* ── Timeline ── */
.timeline-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;margin-bottom:4px}
.timeline-wrap table{border-collapse:collapse;min-width:100%}
.timeline-wrap thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.timeline-wrap thead th:not(:first-child){text-align:right}
.timeline-wrap tbody tr:hover{background:rgba(124,111,255,.04)}
.timeline-wrap tbody td{padding:8px 14px;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
.timeline-wrap tbody td:not(:first-child){text-align:right}
.timeline-wrap td.date-cell{color:var(--text);font-weight:500;font-size:12px}
.timeline-wrap th.ga-col{color:#60a5fa}
.timeline-wrap th.af-col{color:#a78bfa}
.timeline-wrap th.derived-col{color:var(--muted)}

/* ── State ── */
.state{text-align:center;padding:60px 20px;color:var(--muted)}
.state .icon{font-size:36px;margin-bottom:10px}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:14px 18px;color:var(--red);margin-bottom:16px;font-size:13px}
.hint{font-size:11px;color:var(--muted);margin-top:6px}

/* ── Creatives tab ── */
#creatives-wrap{max-width:1400px;margin:0 auto;padding:20px 24px 80px}
.ch-tabs{display:flex;gap:4px;margin-bottom:16px}
.ch-tab{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s}
.ch-tab:hover{border-color:var(--accent);color:var(--accent)}
.ch-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.camp-block{margin-bottom:24px}
.camp-hd{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.camp-hd .ch-badge{background:var(--surface2);border:1px solid var(--border);padding:1px 7px;border-radius:4px;font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0}
.camp-hd .cfg-toggle{font-size:11px;color:var(--accent);text-transform:none;letter-spacing:0;margin-left:auto}
.rot-cfg{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.rot-cfg label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.rot-cfg select,.rot-cfg input[type=number]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:12px;outline:none;width:80px}
.rot-cfg select{width:auto}
.rot-cfg .save-btn{background:var(--accent);border:none;color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap}
.rot-cfg .save-btn:hover{opacity:.88}
.rot-cfg .del-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.rot-cfg .del-btn:hover{border-color:var(--red);color:var(--red)}
.ads-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
.ads-wrap table{width:100%;border-collapse:collapse;min-width:900px}
.ads-wrap thead th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.ads-wrap thead th:not(:first-child):not(:nth-child(2)):not(:nth-child(3)):not(:nth-child(4)){text-align:right}
.ads-wrap thead th.ga-col{color:#60a5fa}
.ads-wrap thead th.af-col{color:#a78bfa}
.ads-wrap tbody tr:hover{background:rgba(255,255,255,.02)}
.ads-wrap tbody td{padding:8px 12px;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
.ads-wrap tbody td:not(:first-child):not(:nth-child(2)):not(:nth-child(3)):not(:nth-child(4)){text-align:right}
.ads-wrap tbody tr.top-ad{background:rgba(34,197,94,.04)}
.rank-badge{display:inline-block;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle}
.status-en{color:var(--green);font-weight:600}
.status-pa{color:var(--muted)}
.below-thresh{color:var(--muted);font-style:italic}
input.pool-chk{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
#rot-action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:10px;z-index:30}
#rot-preview-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:center;justify-content:center}
#rot-preview-inner{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:700px;width:92%;max-height:80vh;overflow-y:auto}
#rot-preview-inner h3{font-size:14px;font-weight:600;margin-bottom:14px}
.prev-row{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;flex-direction:column;gap:3px}
.prev-row:last-child{border-bottom:none}
.prev-en{color:var(--green)}
.prev-pa{color:var(--red)}
.prev-reason{font-size:11px;color:var(--muted)}
.prev-actions{display:flex;gap:8px;margin-top:16px}

/* ── Facebook section ── */
#fb-section{max-width:1200px;margin:0 auto;padding:0 24px 32px}
.fb-account{margin-bottom:20px}
.fb-account-hd{font-size:11px;font-weight:600;color:#60cdff;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;margin-top:20px;display:flex;align-items:center;gap:8px}
.fb-account-hd .fb-badge{background:rgba(96,205,255,.12);border:1px solid rgba(96,205,255,.25);padding:1px 8px;border-radius:4px;font-size:10px;color:#60cdff}
.fb-account-hd .fb-error{color:var(--red);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0}
.fb-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
.fb-table table{width:100%;border-collapse:collapse;min-width:700px}
.fb-table thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.fb-table thead th:not(:first-child){text-align:right}
.fb-table tbody tr:hover{background:rgba(255,255,255,.02)}
.fb-table tbody td{padding:9px 14px;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
.fb-table tbody td:not(:first-child){text-align:right}
.fb-table tbody tr.fb-total td{border-top:1px solid var(--border);font-weight:600;color:var(--text)}

/* ── Notes page ── */
.page{display:none}.page.active{display:block}
.nav-tabs{display:flex;gap:4px;margin-left:auto}
.nav-tab{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s}
.nav-tab:hover{border-color:var(--accent);color:var(--accent)}
.nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.notes-wrap{max-width:720px;margin:32px auto;padding:0 24px}
.notes-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.notes-form h2{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
.notes-form textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:13px;resize:vertical;min-height:100px;outline:none;font-family:inherit}
.notes-form textarea:focus{border-color:var(--accent)}
.notes-form input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;font-size:13px;outline:none;font-family:inherit;margin-top:8px}
.notes-form input[type=text]:focus{border-color:var(--accent)}
.notes-form .row{display:flex;gap:8px;margin-top:10px;align-items:center}
.notes-form .submit{background:var(--accent);border:none;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.notes-form .submit:hover{opacity:.88}
.notes-form .submit:disabled{opacity:.5;cursor:not-allowed}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;position:relative}
.note-card .note-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.note-card .note-meta{font-size:11px;color:var(--muted);margin-top:8px}
.note-card .note-del{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:4px}
.note-card .note-del:hover{color:var(--red)}
</style>
</head>
<body>

<!-- Filters -->
<div class="filters">
  <h1>Urban Heat — <span>Ad Dashboard</span></h1>
  <div class="sep"></div>
  <select id="campaignFilter"><option value="all">All Campaigns</option></select>
  <div class="btn-group" id="osFilter">
    <button class="btn active" onclick="setOS('all',this)">All</button>
    <button class="btn"        onclick="setOS('android',this)">🤖 Android</button>
    <button class="btn"        onclick="setOS('ios',this)">🍎 iOS</button>
  </div>
  <div class="sep"></div>
  <div class="btn-group" id="presetFilter">
    <button class="btn" onclick="setPreset(7,this)">7d</button>
    <button class="btn active" onclick="setPreset(14,this)">14d</button>
    <button class="btn" onclick="setPreset(21,this)">21d</button>
  </div>
  <input type="date" id="fromDate">
  <span style="color:var(--muted);font-size:11px">→</span>
  <input type="date" id="toDate">
  <button class="btn icon" id="refreshBtn" onclick="loadReport(true)" title="Force refresh from API">↻</button>
  <span id="cacheTag" style="display:none;font-size:11px;color:var(--muted);white-space:nowrap"></span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard',this)">Dashboard</button>
    <button class="nav-tab" onclick="showPage('creatives',this)">🎨 Creatives</button>
    <button class="nav-tab" onclick="showPage('notes',this)">📝 Notes</button>
  </div>
</div>

<!-- Metric toggles -->
<div class="metric-bar">
  <span class="bar-label">Show metrics:</span>
  <button class="chip on"  data-metric="spend">Spend</button>
  <button class="chip on"  data-metric="installs">Installs / Conv</button>
  <button class="chip on"  data-metric="cpm">CPM</button>
  <button class="chip on"  data-metric="cpi">CPI / CPA</button>
  <button class="chip on"  data-metric="ctr">CTR</button>
  <button class="chip on"  data-metric="cvr">CVR</button>
  <button class="chip on"  data-metric="purchases">Purchases</button>
  <button class="chip"     data-metric="revenue">Revenue</button>
  <button class="chip"     data-metric="roas">ROAS</button>
  <button class="chip"     data-metric="arpu">ARPU</button>
  <button class="chip"     data-metric="sessions">Purchasers</button>
</div>

<div id="page-dashboard" class="page active">
  <main id="main">
    <div class="state"><div class="icon">⏳</div><p>Loading…</p></div>
  </main>
  <div id="fb-section" style="display:none">
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:8px;padding:0 0 4px;border-top:1px solid var(--border)">Facebook Ads <span style="color:#60cdff">(read-only test)</span></div>
    <div id="fb-titan" class="fb-account"></div>
    <div id="fb-hitzone" class="fb-account"></div>
  </div>
</div>

<div id="page-creatives" class="page">
  <div id="creatives-wrap">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div class="ch-tabs" id="chTabs">
        <button class="ch-tab active" data-ch="ALL" onclick="setChannel('ALL',this)">All</button>
        <button class="ch-tab" data-ch="SEARCH" onclick="setChannel('SEARCH',this)">Search</button>
        <button class="ch-tab" data-ch="DISPLAY" onclick="setChannel('DISPLAY',this)">Display</button>
        <button class="ch-tab" data-ch="VIDEO" onclick="setChannel('VIDEO',this)">YouTube</button>
      </div>
      <button class="btn" onclick="loadCreatives()" style="margin-left:auto">↻ Refresh</button>
      <span id="creatives-status" style="font-size:11px;color:var(--muted)"></span>
    </div>
    <div id="creatives-main"><div class="state"><div class="icon">⏳</div><p>Loading ads…</p></div></div>
  </div>
  <!-- Sticky action bar -->
  <div id="rot-action-bar" style="display:none">
    <button class="btn" onclick="runRotation(true)">Preview Changes</button>
    <button class="btn" style="background:var(--accent);border-color:var(--accent);color:#fff" onclick="runRotation(false)">Rotate Now</button>
    <span id="rot-status" style="font-size:12px;color:var(--muted)"></span>
  </div>
  <!-- Preview modal -->
  <div id="rot-preview-modal" style="display:none">
    <div id="rot-preview-inner">
      <h3>Rotation Preview</h3>
      <div id="rot-preview-content"></div>
      <div class="prev-actions">
        <button class="btn" style="background:var(--accent);border-color:var(--accent);color:#fff" onclick="applyRotation()">Apply These Changes</button>
        <button class="btn" onclick="document.getElementById('rot-preview-modal').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div id="page-notes" class="page">
  <div class="notes-wrap">
    <div class="notes-form">
      <h2>Leave a note / improvement idea</h2>
      <textarea id="noteText" placeholder="Write your note here…"></textarea>
      <input type="text" id="noteAuthor" placeholder="Your name (optional)">
      <div class="row">
        <button class="submit" id="noteSubmit" onclick="submitNote()">Post Note</button>
        <span id="noteStatus" style="font-size:12px;color:var(--muted)"></span>
      </div>
    </div>
    <div id="notesList"><div class="state"><div class="icon">⏳</div><p>Loading notes…</p></div></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────
let reportData = null;
let currentOS  = 'all';
let currentView= 'day';
let activeMetrics = new Set(['spend','installs','cpm','cpi','ctr','cvr','purchases']);

// ── Chips ────────────────────────────────────────────────
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const m = chip.dataset.metric;
    if (activeMetrics.has(m)) { activeMetrics.delete(m); chip.classList.remove('on'); }
    else { activeMetrics.add(m); chip.classList.add('on'); }
    if (reportData) render(reportData);
  });
});

// ── Formatters ───────────────────────────────────────────
const fmt = {
  money: v => v == null ? '—' : '$' + v.toFixed(2),
  num:   v => v == null ? '—' : Math.round(v).toLocaleString(),
  pct:   v => v == null ? '—' : v.toFixed(2) + '%',
};

function diff(af, ga) {
  if (af == null || ga == null || (af===0 && ga===0)) return '<span class="diff neutral">—</span>';
  const p = ga===0 ? Infinity : ((af-ga)/Math.abs(ga))*100;
  const lbl = isFinite(p) ? (p>=0?'+':'')+p.toFixed(1)+'%' : '+∞%';
  return `<span class="diff ${Math.abs(p)>=10?'warn':'good'}">${lbl}</span>`;
}

function tip(title, body) {
  return `<span class="tip-icon">?</span><div class="tooltip"><strong>${title}</strong>${body}</div>`;
}

// ── Metric definitions ───────────────────────────────────
// Each: { label, tip, afVal(af), gaVal(ga), afNum(af), gaNum(ga), afOnly? }
const METRIC_DEFS = {
  spend:     { label:'Spend',          tipTitle:'Ad Spend',          tipBody:'GA: what Google charged. AF: cost reported by AppsFlyer.',                  af: a=>fmt.money(a.spend),   ga: g=>fmt.money(g.spend),       afN: a=>a.spend,      gaN: g=>g.spend },
  installs:  { label:'Installs / Conv',tipTitle:'Installs vs Conversions', tipBody:'AF counts installs via SDK. GA counts a conversion per install. Gap = attribution discrepancy.',  af: a=>fmt.num(a.installs),  ga: g=>fmt.num(g.conversions),   afN: a=>a.installs,   gaN: g=>g.conversions },
  cpm:       { label:'CPM',            tipTitle:'Cost Per 1000 Impressions', tipBody:'Spend ÷ Impressions × 1000. Shows how expensive your reach is.',          af: a=>fmt.money(a.cpm),     ga: g=>fmt.money(g.cpm),         afN: a=>a.cpm,        gaN: g=>g.cpm },
  cpi:       { label:'CPI / CPA',      tipTitle:'Cost Per Install / Action', tipBody:'AF eCPI = Spend ÷ Installs. GA CPA = Spend ÷ Conversions.',               af: a=>fmt.money(a.ecpi),    ga: g=>fmt.money(g.cpa),         afN: a=>a.ecpi,       gaN: g=>g.cpa },
  ctr:       { label:'CTR',            tipTitle:'Click-Through Rate',   tipBody:'Clicks ÷ Impressions. How often people click after seeing your ad.',         af: a=>fmt.pct(a.ctr),       ga: g=>fmt.pct(g.ctr),           afN: a=>a.ctr,        gaN: g=>g.ctr },
  cvr:       { label:'CVR',            tipTitle:'Conversion Rate',      tipBody:'AF: Installs ÷ Clicks. GA: Conversions ÷ Clicks.',                           af: a=>fmt.pct(a.cvr),       ga: g=>fmt.pct(g.cvr),           afN: a=>a.cvr,        gaN: g=>g.cvr },
  purchases: { label:'Purchases',      tipTitle:'Purchases',            tipBody:'AF: af_purchase events via SDK. GA: PURCHASE-category conversion actions. GA may be 0 for tCPA campaigns (India) — only populated for tROAS (US).', af: a=>fmt.num(a.purchases), ga: g=>fmt.num(g.purchases),                                    afN: a=>a.purchases,  gaN: g=>g.purchases },
  revenue:   { label:'Revenue',        tipTitle:'In-App Revenue',       tipBody:'AF: total in-app revenue tracked by AppsFlyer SDK. GA: revenue from PURCHASE conversion actions — only populated for tROAS campaigns; tCPA campaigns return 0.',      af: a=>fmt.money(a.revenue), ga: g=>fmt.money(g.purchaseRevenue!=null&&g.purchaseRevenue>0?g.purchaseRevenue:g.revenue), afN: a=>a.revenue, gaN: g=>g.purchaseRevenue!=null&&g.purchaseRevenue>0?g.purchaseRevenue:g.revenue },
  roas:      { label:'ROAS',           tipTitle:'Return on Ad Spend',   tipBody:'Revenue ÷ Spend × 100. AF: uses AppsFlyer total revenue. GA: uses purchase conversion revenue (tROAS campaigns only).',                                              af: a=>a.roas!=null?a.roas.toFixed(0)+'%':'—', ga: g=>{const r=g.purchaseRevenue>0?g.purchaseRevenue:g.revenue; return r&&g.spend>0?(r/g.spend*100).toFixed(0)+'%':'—';}, afN: a=>a.roas, gaN: g=>{const r=g.purchaseRevenue>0?g.purchaseRevenue:g.revenue; return r&&g.spend>0?r/g.spend*100:null;} },
  arpu:      { label:'ARPU',           tipTitle:'Avg Revenue Per User', tipBody:'Revenue ÷ Installs. AppsFlyer only — GA has no equivalent user-level metric.',                                                                                       af: a=>a.arpu!=null?'$'+a.arpu.toFixed(4):'—', ga:_=>'—',   afN: a=>a.arpu,       gaN: _=>null, afOnly:true },
  sessions:  { label:'Purchasers',     tipTitle:'Unique Purchasers',    tipBody:'Unique users who triggered af_purchase event. AppsFlyer only — GA conversion actions count events, not unique users.',                                               af: a=>fmt.num(a.purchasers),ga: _=>'—',                     afN: a=>a.purchasers, gaN: _=>null, afOnly:true },
};

// ── Get current data slice ────────────────────────────────
function getSlice(data) {
  const camp = document.getElementById('campaignFilter').value;
  const base = data.aggregate[currentOS];
  if (camp === 'all') return { ga: base.ga, af: base.af };
  // Filter to specific campaign
  const c = base.campaigns?.find(x => x.name === camp);
  return c ? { ga: c.ga, af: c.af } : { ga: base.ga, af: base.af };
}

// ── Build metrics table ───────────────────────────────────
function buildMetricsTable(ga, af) {
  const rows = [...activeMetrics].map(key => {
    const d = METRIC_DEFS[key]; if (!d) return '';
    const afV = d.af(af), gaV = d.ga(ga), afN = d.afN(af), gaN = d.gaN(ga);
    const diffCell = d.afOnly ? '<span class="diff neutral">—</span>' : diff(afN, gaN);
    const gaCell   = d.afOnly ? `<td style="color:var(--muted);font-style:italic">AF only</td>` : `<td>${gaV}</td>`;
    return `<tr>
      <td><div class="metric-name">${d.label}${tip(d.tipTitle, d.tipBody)}</div></td>
      <td>${afV}</td>
      ${gaCell}
      <td>${diffCell}</td>
    </tr>`;
  }).join('');

  if (!rows) return '<p style="padding:16px;color:var(--muted);font-size:12px">No metrics selected — use the toggles above.</p>';
  return `<div class="metrics-table"><table>
    <thead><tr><th style="width:30%">Metric</th><th>AppsFlyer</th><th>Google Ads</th><th>Diff</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ── Weekly grouping ───────────────────────────────────────
function toMonday(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay(), diff = day===0?-6:1-day;
  const mon = new Date(d); mon.setDate(d.getDate()+diff);
  return mon.toISOString().split('T')[0];
}

function groupDaysByWeek(days) {
  const weeks = {};
  const camp  = document.getElementById('campaignFilter').value;
  for (const day of days) {
    const key = toMonday(day.date);
    if (!weeks[key]) weeks[key] = { key, days:[], ga:{ spend:0,clicks:0,impressions:0,conversions:0,purchases:0,purchaseRevenue:0,revenue:0,cpm:null,cpa:null,ctr:null,cvr:null }, af:{ spend:0,clicks:0,impressions:0,installs:0,purchases:0,purchasers:0,revenue:0,cpm:null,ecpi:null,ctr:null,cvr:null,roas:null,arpu:null } };
    weeks[key].days.push(day.date);
    const base = (camp !== 'all' && day.campaigns?.[camp]) ? day.campaigns[camp] : day;
    const s = base[currentOS] || base.all;
    weeks[key].ga.spend           += s.ga.spend||0;
    weeks[key].ga.clicks          += s.ga.clicks||0;
    weeks[key].ga.impressions     += s.ga.impressions||0;
    weeks[key].ga.conversions     += s.ga.conversions||0;
    weeks[key].ga.purchases       += s.ga.purchases||0;
    weeks[key].ga.purchaseRevenue += s.ga.purchaseRevenue||0;
    weeks[key].ga.revenue         += s.ga.revenue||0;
    weeks[key].af.spend           += s.af.spend||0;
    weeks[key].af.clicks          += s.af.clicks||0;
    weeks[key].af.impressions     += s.af.impressions||0;
    weeks[key].af.installs        += s.af.installs||0;
    weeks[key].af.purchases       += s.af.purchases||0;
    weeks[key].af.purchasers      += s.af.purchasers||0;
    weeks[key].af.revenue         += s.af.revenue||0;
  }
  // Recompute rates for each week
  for (const w of Object.values(weeks)) {
    const g=w.ga, a=w.af;
    g.cpm = g.impressions>0 ? (g.spend/g.impressions)*1000 : null;
    g.cpa = g.conversions>0 ? g.spend/g.conversions : null;
    g.ctr = g.impressions>0 ? (g.clicks/g.impressions)*100 : null;
    g.cvr = g.clicks>0 ? (g.conversions/g.clicks)*100 : null;
    a.cpm = a.impressions>0 ? (a.spend/a.impressions)*1000 : null;
    a.ecpi= a.installs>0 ? a.spend/a.installs : null;
    a.ctr = a.impressions>0 ? (a.clicks/a.impressions)*100 : null;
    a.cvr = a.clicks>0 ? (a.installs/a.clicks)*100 : null;
    a.roas= a.spend>0 ? (a.revenue/a.spend)*100 : null;
    a.arpu= a.installs>0 ? a.revenue/a.installs : null;
  }
  return Object.values(weeks).sort((a,b)=>b.key.localeCompare(a.key));
}

// ── Build timeline ────────────────────────────────────────
function buildTimeline(days) {
  // Column spec: { key, label, class, afFmt, gaFmt }
  const cols = [];
  const TIMELINE_COLS = {
    spend:     { label:'Spend',      afFmt: a=>fmt.money(a.spend),     gaFmt: g=>fmt.money(g.spend),       cls:'af-col', gaCls:'ga-col' },
    installs:  { label:'Conv / Inst',afFmt: a=>fmt.num(a.installs),    gaFmt: g=>fmt.num(g.conversions),   cls:'af-col', gaCls:'ga-col' },
    cpm:       { label:'CPM',        afFmt: a=>fmt.money(a.cpm),       gaFmt: g=>fmt.money(g.cpm),         cls:'af-col', gaCls:'ga-col' },
    cpi:       { label:'CPI / CPA',  afFmt: a=>fmt.money(a.ecpi),      gaFmt: g=>fmt.money(g.cpa),         cls:'af-col', gaCls:'ga-col' },
    ctr:       { label:'CTR',        afFmt: a=>fmt.pct(a.ctr),         gaFmt: g=>fmt.pct(g.ctr),           cls:'af-col', gaCls:'ga-col' },
    cvr:       { label:'CVR',        afFmt: a=>fmt.pct(a.cvr),         gaFmt: g=>fmt.pct(g.cvr),           cls:'af-col', gaCls:'ga-col' },
    purchases: { label:'Purchases',  afFmt: a=>fmt.num(a.purchases),   gaFmt: g=>fmt.num(g.purchases),                                                                         cls:'af-col', gaCls:'ga-col' },
    revenue:   { label:'Revenue',    afFmt: a=>fmt.money(a.revenue),   gaFmt: g=>fmt.money(g.purchaseRevenue>0?g.purchaseRevenue:g.revenue),                                cls:'af-col', gaCls:'ga-col' },
    roas:      { label:'ROAS',       afFmt: a=>a.roas!=null?a.roas.toFixed(0)+'%':'—', gaFmt: g=>{const r=g.purchaseRevenue>0?g.purchaseRevenue:g.revenue; return r&&g.spend>0?(r/g.spend*100).toFixed(0)+'%':'—';}, cls:'af-col', gaCls:'ga-col' },
    arpu:      { label:'ARPU',       afFmt: a=>a.arpu!=null?'$'+a.arpu.toFixed(4):'—', gaFmt:_=>'—',       cls:'af-col', gaCls:'derived-col', afOnly:true },
    sessions:  { label:'Purchasers', afFmt: a=>fmt.num(a.purchasers),  gaFmt: _=>'—',                      cls:'af-col', gaCls:'derived-col', afOnly:true },
  };

  for (const key of activeMetrics) {
    const c = TIMELINE_COLS[key]; if (!c) continue;
    cols.push({ ...c, key, header: c.afOnly ? `${c.label} (AF)` : `AF ${c.label}` });
    if (!c.afOnly) cols.push({ ...c, key, header: `GA ${c.label}`, isGA: true });
  }

  if (!cols.length) return '';

  const thead = `<tr><th>Date</th>${cols.map(c=>`<th class="${c.isGA?(c.gaCls||'ga-col'):c.cls}">${c.header}</th>`).join('')}</tr>`;

  const isWeek = currentView === 'week';
  const rows   = isWeek ? groupDaysByWeek(days) : days;

  const camp = document.getElementById('campaignFilter').value;
  const tbodyRows = rows.map(row => {
    const dateStr = isWeek
      ? 'Wk ' + row.key.slice(5)
      : new Date(row.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const base = isWeek ? row : ((camp !== 'all' && row.campaigns?.[camp]) ? row.campaigns[camp] : row);
    const s = isWeek ? row : (base[currentOS] || base.all);
    const cells = cols.map(c => {
      const val = c.isGA ? c.gaFmt(s.ga) : c.afFmt(s.af);
      return `<td>${val}</td>`;
    }).join('');
    return `<tr><td class="date-cell">${dateStr}</td>${cells}</tr>`;
  }).join('');

  return `<div class="timeline-wrap"><table><thead>${thead}</thead><tbody>${tbodyRows}</tbody></table></div>`;
}

// ── Render ───────────────────────────────────────────────
function render(data) {
  const slice = getSlice(data);
  let html = '';

  html += '<div class="section-hd">Key Metrics</div>';
  html += buildMetricsTable(slice.ga, slice.af);
  html += '<div class="hint">⚠ red = ≥10% difference &nbsp;·&nbsp; hover metric name for details</div>';

  html += `<div class="section-hd" style="margin-top:24px;display:flex;align-items:center;gap:8px">
    Timeline
    <div class="btn-group" style="margin-left:auto">
      <button class="btn ${currentView==='day'?'active':''}" onclick="setView('day',this)">Day</button>
      <button class="btn ${currentView==='week'?'active':''}" onclick="setView('week',this)">Week</button>
    </div>
  </div>`;
  html += buildTimeline(data.days);

  document.getElementById('main').innerHTML = html;
}

// ── Controls ─────────────────────────────────────────────
function setOS(os, btn) {
  currentOS = os;
  document.querySelectorAll('#osFilter .btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (reportData) render(reportData);
}

function setView(v, btn) {
  currentView = v;
  // update buttons if called from toggle (btn may be null on init)
  if (reportData) render(reportData);
}

function localDateStr(d) {
  // Returns YYYY-MM-DD in local timezone (avoids UTC shift on toISOString)
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function setPreset(days, btn) {
  document.querySelectorAll('#presetFilter .btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const to   = new Date(Date.now()-86400000);
  const from = new Date(to-(days-1)*86400000);
  document.getElementById('toDate').value   = localDateStr(to);
  document.getElementById('fromDate').value = localDateStr(from);
  loadReport();
}

function initDates() {
  const to   = new Date(Date.now()-86400000);
  const from = new Date(to-13*86400000);
  document.getElementById('toDate').value   = localDateStr(to);
  document.getElementById('fromDate').value = localDateStr(from);
}

// ── Load ─────────────────────────────────────────────────
async function loadReport(forceRefresh = false) {
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;
  const btn  = document.getElementById('refreshBtn');
  const tag  = document.getElementById('cacheTag');
  btn.disabled = true;
  tag.style.display = 'none';
  document.getElementById('main').innerHTML='<div class="state"><div class="icon">⏳</div><p>Loading…</p></div>';
  try {
    const url  = `/api/report?from=${from}&to=${to}${forceRefresh ? '&refresh=1' : ''}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error||'Unknown error');
    if (data._afDebug) console.log('[AF debug]', data._afDebug);
    reportData = data;
    if (data._fromDB) {
      tag.textContent = `💾 from local DB`;
      tag.style.display = 'inline';
    } else {
      tag.textContent = `🔄 fetched live`;
      tag.style.display = 'inline';
      setTimeout(() => tag.style.display = 'none', 4000);
    }
    if (data._afDebug) console.log('[AF debug]', data._afDebug);

    // Populate campaign dropdown
    const sel = document.getElementById('campaignFilter');
    sel.innerHTML = '<option value="all">All Campaigns</option>' +
      data.campaignNames.map(n=>`<option value="${n}">${n}</option>`).join('');
    sel.onchange = () => render(data);

    render(data);
  } catch(err) {
    document.getElementById('main').innerHTML=`<div class="error-msg">❌ ${err.message}</div><div class="state"><p>Check server console for details.</p></div>`;
  } finally { btn.disabled=false; }
}

// ── Creatives Tab ────────────────────────────────────────
let creativesData   = null;
let rotConfigs      = {};   // { [campaignId]: config }
let currentChannel  = 'ALL';
let pendingPreview  = null;
let creativesLoaded = false;

function setChannel(ch, btn) {
  currentChannel = ch;
  document.querySelectorAll('.ch-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (creativesData) renderCreatives();
}

async function loadCreatives() {
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;
  document.getElementById('creatives-main').innerHTML = '<div class="state"><div class="icon">⏳</div><p>Loading ads…</p></div>';
  document.getElementById('creatives-status').textContent = '';
  document.getElementById('rot-action-bar').style.display = 'none';

  try {
    const [adsRes, cfgRes] = await Promise.all([
      fetch(`/api/ads?from=${from}&to=${to}`),
      fetch('/api/rotate/config')
    ]);
    const adsJson = await adsRes.json();
    const cfgJson = await cfgRes.json();
    if (!adsRes.ok) throw new Error(adsJson.error || 'Failed to load ads');
    creativesData = adsJson;
    rotConfigs = {};
    for (const c of (cfgJson || [])) rotConfigs[c.campaignId] = c;
    renderCreatives();
    creativesLoaded = true;
    document.getElementById('creatives-status').textContent = `${adsJson.campaigns?.length || 0} campaigns · ${from} → ${to}`;
  } catch(err) {
    document.getElementById('creatives-main').innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
  }
}

function renderCreatives() {
  if (!creativesData) return;
  const camps = creativesData.campaigns.filter(c =>
    currentChannel === 'ALL' || c.channelType === currentChannel
  );
  if (!camps.length) {
    document.getElementById('creatives-main').innerHTML = '<div class="state"><p style="color:var(--muted)">No campaigns for this channel type.</p></div>';
    return;
  }

  let hasPool = false;
  const html = camps.map(camp => {
    const cfg = rotConfigs[camp.campaignId] || {};
    const pool = new Set(cfg.poolResourceNames || []);
    const metric = cfg.rankMetric || 'cpi';
    const asc    = cfg.rankDirection !== 'desc';
    const keepN  = cfg.keepTopN ?? 2;
    const thresh = cfg.minSpendThreshold ?? 20;

    // Sort pool ads by metric for ranking
    const poolAds = camp.ads.filter(a => pool.has(a.resourceName));
    const rankable = poolAds.filter(a => a.spend >= thresh && a[metric] != null)
      .sort((a, b) => asc ? a[metric] - b[metric] : b[metric] - a[metric]);
    const topRNs = new Set(rankable.slice(0, keepN).map(a => a.resourceName));

    if (pool.size) hasPool = true;

    const chBadge = { SEARCH:'Search', DISPLAY:'Display', VIDEO:'YouTube', UNKNOWN:'Unknown' }[camp.channelType] || camp.channelType;

    const rows = camp.ads.map(ad => {
      const inPool  = pool.has(ad.resourceName);
      const isTop   = topRNs.has(ad.resourceName);
      const below   = inPool && ad.spend < thresh;
      const rankIdx = rankable.findIndex(a => a.resourceName === ad.resourceName);
      const badge   = inPool && rankIdx >= 0 ? `<span class="rank-badge">#${rankIdx+1}</span>` : '';
      const statusCls = ad.status === 'ENABLED' ? 'status-en' : 'status-pa';

      return `<tr class="${isTop ? 'top-ad' : ''}">
        <td><input type="checkbox" class="pool-chk" ${inPool?'checked':''} onchange="togglePool('${ad.resourceName}','${camp.campaignId}',this.checked)"></td>
        <td>${escHtml(ad.displayName)}${badge}${below ? ' <span title="Below spend threshold" style="color:var(--muted)">⚠️</span>' : ''}</td>
        <td style="color:var(--muted);font-size:11px">${escHtml(ad.adGroupName)}</td>
        <td><span class="${statusCls}">${ad.status === 'ENABLED' ? 'On' : 'Off'}</span></td>
        <td class="${below?'below-thresh':''}">${ad.spend > 0 ? '$'+ad.spend.toFixed(2) : '—'}</td>
        <td>${ad.ctr != null ? ad.ctr.toFixed(2)+'%' : '—'}</td>
        <td>${ad.cpmGA != null ? '$'+ad.cpmGA.toFixed(2) : '—'}</td>
        <td>${ad.conversions > 0 ? Math.round(ad.conversions) : '—'}</td>
        <td>${ad.cpa != null ? '$'+ad.cpa.toFixed(2) : '—'}</td>
        <td>${ad.installs > 0 ? ad.installs : '—'}</td>
        <td>${ad.cpi != null ? '$'+ad.cpi.toFixed(2) : '—'}</td>
        <td>${ad.cvrAF != null ? ad.cvrAF.toFixed(2)+'%' : '—'}</td>
      </tr>`;
    }).join('');

    const cfgOpen = !!cfg.campaignId;
    return `<div class="camp-block" id="camp-${camp.campaignId}">
      <div class="camp-hd" onclick="toggleCfg('${camp.campaignId}')">
        ${escHtml(camp.campaignName)}
        <span class="ch-badge">${chBadge}</span>
        <span class="cfg-toggle">${cfgOpen ? '▼' : '▶'} Config</span>
      </div>
      <div id="cfg-${camp.campaignId}" style="display:${cfgOpen?'flex':'none'}">
        <div class="rot-cfg">
          <label>Keep top <input type="number" min="1" max="20" value="${keepN}" id="keepN-${camp.campaignId}" style="width:55px"></label>
          <label>Rank by
            <select id="metric-${camp.campaignId}">
              <option value="cpi" ${metric==='cpi'?'selected':''}>AF › CPI</option>
              <option value="cpa" ${metric==='cpa'?'selected':''}>GA › CPA</option>
              <option value="ctr" ${metric==='ctr'?'selected':''}>GA › CTR</option>
              <option value="cvrAF" ${metric==='cvrAF'?'selected':''}>AF › CVR</option>
              <option value="cvr" ${metric==='cvr'?'selected':''}>GA › CVR</option>
            </select>
          </label>
          <label>Min spend $<input type="number" min="0" value="${thresh}" id="thresh-${camp.campaignId}" style="width:65px"></label>
          <button class="save-btn" onclick="saveConfig('${camp.campaignId}','${escHtml(camp.campaignName)}')">Save Config</button>
          ${cfg.campaignId ? `<button class="del-btn" onclick="deleteConfig('${camp.campaignId}')">Remove</button>` : ''}
        </div>
      </div>
      <div class="ads-wrap">
        <table>
          <thead><tr>
            <th>Pool</th><th>Ad</th><th>Ad Group</th><th>Status</th>
            <th class="ga-col">Spend</th>
            <th class="ga-col">CTR</th>
            <th class="ga-col">CPM</th>
            <th class="ga-col">Conv</th>
            <th class="ga-col">CPA</th>
            <th class="af-col">Installs</th>
            <th class="af-col">CPI</th>
            <th class="af-col">CVR</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  document.getElementById('creatives-main').innerHTML = html;
  document.getElementById('rot-action-bar').style.display = hasPool ? 'flex' : 'none';
}

function toggleCfg(campaignId) {
  const el = document.getElementById(`cfg-${campaignId}`);
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function togglePool(resourceName, campaignId, checked) {
  const cfg = rotConfigs[campaignId] || { campaignId, poolResourceNames: [] };
  if (checked) {
    if (!cfg.poolResourceNames.includes(resourceName)) cfg.poolResourceNames.push(resourceName);
  } else {
    cfg.poolResourceNames = cfg.poolResourceNames.filter(rn => rn !== resourceName);
  }
  rotConfigs[campaignId] = cfg;
  // Save immediately
  const camp = creativesData?.campaigns.find(c => c.campaignId === campaignId);
  if (camp) saveConfig(campaignId, camp.campaignName, true);
  document.getElementById('rot-action-bar').style.display =
    Object.values(rotConfigs).some(c => c.poolResourceNames?.length) ? 'flex' : 'none';
}

async function saveConfig(campaignId, campaignName, silent = false) {
  const keepN  = parseInt(document.getElementById(`keepN-${campaignId}`)?.value  || 2);
  const metric = document.getElementById(`metric-${campaignId}`)?.value || 'cpi';
  const thresh = parseFloat(document.getElementById(`thresh-${campaignId}`)?.value || 20);
  const cfg = rotConfigs[campaignId] || { campaignId, poolResourceNames: [] };
  const payload = { ...cfg, campaignId, campaignName, keepTopN: keepN, rankMetric: metric,
    rankDirection: ['cpa','cpi'].includes(metric) ? 'asc' : 'desc',
    minSpendThreshold: thresh, enabled: true };
  rotConfigs[campaignId] = payload;
  try {
    await fetch('/api/rotate/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (!silent) renderCreatives();
  } catch(e) { if (!silent) alert('Save failed: ' + e.message); }
}

async function deleteConfig(campaignId) {
  await fetch(`/api/rotate/config?campaignId=${campaignId}`, { method: 'DELETE' });
  delete rotConfigs[campaignId];
  renderCreatives();
}

async function runRotation(isPreview) {
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;
  document.getElementById('rot-status').textContent = isPreview ? 'Computing preview…' : 'Applying…';
  try {
    const res  = await fetch(`/api/rotate?preview=${isPreview}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ from, to })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    document.getElementById('rot-status').textContent = '';

    if (isPreview) {
      pendingPreview = data;
      showPreviewModal(data);
    } else {
      const msg = `Applied: ${data.summary.toEnable} enabled, ${data.summary.toPause} paused`;
      document.getElementById('rot-status').textContent = '✓ ' + msg;
      loadCreatives();
    }
  } catch(err) {
    document.getElementById('rot-status').textContent = '✗ ' + err.message;
  }
}

function showPreviewModal(data) {
  const { changes, summary } = data;
  const noChange = `<p style="color:var(--muted);padding:12px 0">No changes needed — ads are already correctly arranged.</p>`;
  const rows = changes.length ? changes.map(c => {
    const cls   = c.newStatus === 'ENABLED' ? 'prev-en' : 'prev-pa';
    const arrow = c.newStatus === 'ENABLED' ? '▲ Enable' : '▼ Pause';
    return `<div class="prev-row">
      <div><strong>${escHtml(c.campaignName)}</strong> — ${escHtml(c.displayName)}</div>
      <div class="${cls}">${arrow}: ${c.currentStatus} → ${c.newStatus}</div>
      <div class="prev-reason">${escHtml(c.reason)}</div>
    </div>`;
  }).join('') : noChange;

  document.getElementById('rot-preview-content').innerHTML = `
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
      ${summary.toEnable} to enable · ${summary.toPause} to pause · ${summary.unchanged} unchanged
    </p>${rows}`;
  document.getElementById('rot-preview-modal').style.display = 'flex';
}

async function applyRotation() {
  document.getElementById('rot-preview-modal').style.display = 'none';
  await runRotation(false);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Facebook Ads ─────────────────────────────────────────
function fbMoney(v) { return v == null ? '—' : '$' + v.toFixed(2); }
function fbNum(v)   { return v == null || v === 0 ? '—' : Math.round(v).toLocaleString(); }
function fbPct(v)   { return v == null ? '—' : v.toFixed(2) + '%'; }

function buildFBTable(data) {
  if (data.error) return `<div class="fb-account-hd"><span class="fb-error">✗ ${data.error}${data.code ? ' (code ' + data.code + ')' : ''}</span></div>`;
  const rows = [...data.campaigns, { name: 'TOTAL', ...data.total, _total: true }];
  const body = rows.map(c => `<tr class="${c._total ? 'fb-total' : ''}">
    <td>${c.name}</td>
    <td>${fbMoney(c.spend)}</td>
    <td>${fbNum(c.impressions)}</td>
    <td>${fbNum(c.clicks)}</td>
    <td>${fbPct(c.ctr)}</td>
    <td>${fbMoney(c.cpm)}</td>
    <td>${fbMoney(c.cpc)}</td>
    <td>${fbNum(c.installs)}</td>
    <td>${fbMoney(c.ecpi)}</td>
    <td>${fbNum(c.purchases)}</td>
  </tr>`).join('');
  return `<div class="fb-table"><table>
    <thead><tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>CPM</th><th>CPC</th><th>Installs</th><th>eCPI</th><th>Purchases</th></tr></thead>
    <tbody>${body}</tbody>
  </table></div>`;
}

async function loadFacebook() {
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;
  const sec  = document.getElementById('fb-section');
  sec.style.display = 'block';
  document.getElementById('fb-titan').innerHTML   = '<div style="color:var(--muted);font-size:12px;padding:8px 0">Loading Titan…</div>';
  document.getElementById('fb-hitzone').innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0">Loading HitZone…</div>';
  try {
    const res  = await fetch(`/api/facebook?from=${from}&to=${to}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Unknown error');
    document.getElementById('fb-titan').innerHTML   = `<div class="fb-account-hd">Titan <span class="fb-badge">act_${data.titan?.campaigns ? 'OK' : 'ERR'}</span></div>` + buildFBTable(data.titan);
    document.getElementById('fb-hitzone').innerHTML = `<div class="fb-account-hd">HitZone <span class="fb-badge">act_${data.hitzone?.campaigns ? 'OK' : 'ERR'}</span></div>` + buildFBTable(data.hitzone);
  } catch(err) {
    document.getElementById('fb-titan').innerHTML   = `<div class="fb-account-hd"><span class="fb-error">✗ ${err.message}</span></div>`;
    document.getElementById('fb-hitzone').innerHTML = '';
  }
}

initDates();
(function() {
  const yesterday = localDateStr(new Date(Date.now()-86400000));
  ['fromDate','toDate'].forEach(id => {
    const el = document.getElementById(id);
    el.max = yesterday;
    el.addEventListener('click', function() { try { this.showPicker(); } catch(_) {} });
    el.addEventListener('change', function() {
      // clamp to yesterday
      if (this.value > yesterday) this.value = yesterday;
      loadReport();
      loadFacebook();
    });
  });
})();
loadReport();
loadFacebook();

// ── Page navigation ───────────────────────────────────────
function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');

  // Hide dashboard-only controls when on notes
  const dashOnly = document.querySelector('.metric-bar');
  dashOnly.style.display = page === 'dashboard' ? '' : 'none';

  if (page === 'notes') loadNotes();
  if (page === 'creatives' && !creativesLoaded) loadCreatives();
  // Hide rotation action bar when leaving creatives tab
  if (page !== 'creatives') document.getElementById('rot-action-bar').style.display = 'none';
}

// ── Notes ─────────────────────────────────────────────────
async function loadNotes() {
  const list = document.getElementById('notesList');
  try {
    const res   = await fetch('/api/notes');
    const notes = await res.json();
    if (!notes.length) {
      list.innerHTML = '<div class="state"><p style="color:var(--muted)">No notes yet — be the first to leave one!</p></div>';
      return;
    }
    list.innerHTML = notes.map(n => {
      const date = new Date(n.createdAt).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<div class="note-card">
        <button class="note-del" onclick="deleteNote('${n._id}')" title="Delete">×</button>
        <div class="note-text">${n.text.replace(/</g,'&lt;')}</div>
        <div class="note-meta">${n.author} · ${date}</div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div class="error-msg">Failed to load notes: ${e.message}</div>`;
  }
}

async function submitNote() {
  const text   = document.getElementById('noteText').value;
  const author = document.getElementById('noteAuthor').value;
  const btn    = document.getElementById('noteSubmit');
  const status = document.getElementById('noteStatus');
  if (!text.trim()) { status.textContent = 'Please write something first.'; return; }
  btn.disabled = true;
  status.textContent = 'Saving…';
  try {
    const res = await fetch('/api/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, author })
    });
    if (!res.ok) throw new Error((await res.json()).error);
    document.getElementById('noteText').value   = '';
    document.getElementById('noteAuthor').value = '';
    status.textContent = '✓ Note saved!';
    setTimeout(() => status.textContent = '', 3000);
    loadNotes();
  } catch(e) {
    status.textContent = '❌ ' + e.message;
  } finally { btn.disabled = false; }
}

async function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  await fetch('/api/notes?id=' + id, { method: 'DELETE' });
  loadNotes();
}
</script>
